<div class="container">
    <mat-card>
        <mat-card-title>Login</mat-card-title>

        <mat-card-content>
            <form [formGroup]="loginForm">

                <img src="./assets/images/CakeLa_logo.jpg" class="align-middle m-2 logo" alt="logo" />

                <mat-form-field appearance="outline">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" placeholder="email" required>
                    <mat-error
                        *ngIf="(loginForm.get('email')?.touched) && loginForm.get('email')?.errors && (loginForm.get('email')?.errors)!['required']">
                        Email is required
                    </mat-error>
                    <!-- <mat-error
                        *ngIf="(loginForm.get('email')?.touched) && loginForm.get('email')?.errors && (loginForm.get('email')?.errors)!['email']">
                        Please enter a valid email
                    </mat-error> -->
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Password</mat-label>
                    <input matInput type="{{hidePassword ? 'password' : 'text'}}" formControlName="password"
                        placeholder="password" required>

                    <button mat-icon-button matSuffix (click)="togglePasswordVisibility()">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>

                    <mat-error *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                        Please enter valid password
                    </mat-error>
                </mat-form-field>


                <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid"
                    (click)="onSubmit()">
                    Login
                </button>
            </form>
        </mat-card-content>
    </mat-card>
</div>
